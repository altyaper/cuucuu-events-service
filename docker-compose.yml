services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      EVENT_DATABASE_URL: ${EVENT_DATABASE_URL:-postgresql://postgres:postgres@db:5432/cuucuu_dev}
      EVENT_THRESHOLD: "0.65"
      EVENT_CLASSIFIER_TYPE: transformer
      EVENT_MODEL_PATH: ./models/beto-events
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cuucuu_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
