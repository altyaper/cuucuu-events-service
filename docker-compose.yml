services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cuucuu_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      EVENT_DATABASE_URL: postgresql://postgres:postgres@db:5432/cuucuu_dev
      EVENT_THRESHOLD: "0.65"
      EVENT_CLASSIFIER_TYPE: rule_based
    depends_on:
      - db

volumes:
  pgdata:
