services:
  app:
    build: .
    restart: unless-stopped
    container_name: events-service
    ports:
      - "8001:8001"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - shared

networks:
  shared:
    name: cuucuu-network
    external: true
